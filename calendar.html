<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Glimt – Kalender</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="calendar.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body class="cal-body">

  <header class="navbar">
    <div class="logo">
      <a href="index.html" class="logo-word">
        <svg class="logo-o" viewBox="0 0 44 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="42" height="30" rx="5" fill="#FFEEBC" stroke="rgba(255,255,255,0.92)" stroke-width="2.2"/>
          <path d="M1 4 L22 18 L43 4" stroke="rgba(255,255,255,0.92)" stroke-width="2" stroke-linecap="round"/>
          <path d="M1 29 L15 17.5" stroke="rgba(255,255,255,0.92)" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M43 29 L29 17.5" stroke="rgba(255,255,255,0.92)" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="22" cy="17" r="4" fill="#EA672D"/><g stroke="#EA672D" stroke-width="1.5" stroke-linecap="round"><line x1="22" y1="10.5" x2="22" y2="12"/><line x1="22" y1="22" x2="22" y2="23.5"/><line x1="15.5" y1="17" x2="17" y2="17"/><line x1="27" y1="17" x2="28.5" y2="17"/><line x1="17.4" y1="12.4" x2="18.5" y2="13.5"/><line x1="25.5" y1="20.5" x2="26.6" y2="21.6"/><line x1="17.4" y1="21.6" x2="18.5" y2="20.5"/><line x1="25.5" y1="13.5" x2="26.6" y2="12.4"/></g>
        </svg>
        <span class="logo-wordmark">glimt</span>
      </a>
    </div>
    <nav>
      <a id="nav-back" href="#">← Tilbake</a>
      <a href="#">Kontakt</a>
      <a href="login.html" class="nav-login-btn" id="nav-login-btn">Logg inn</a>
      <div class="nav-user" id="nav-user" style="display:none">
        <div class="nav-avatar" id="nav-avatar"></div>
        <div class="nav-user-dropdown" id="nav-user-dropdown">
          <div class="nav-user-info">
            <div class="nav-user-name" id="nav-user-name"></div>
            <div class="nav-user-email" id="nav-user-email"></div>
          </div>
          <a href="index.html" class="nav-menu-item">Hjem</a>
          <hr class="nav-menu-divider" />
          <a href="#" class="nav-menu-item">Om oss</a>
          <a href="#" class="nav-menu-item">Byer</a>
          <a href="#" class="nav-menu-item">Kontakt</a>
          <hr class="nav-menu-divider" />
          <button class="nav-signout-btn" onclick="signOutUser()">Logg ut</button>
        </div>
      </div>
    </nav>
  </header>

  <!-- By-filter -->
  <div class="cal-city-filter" id="cal-city-filter">
    <button class="cal-city-pill" data-city="København">København</button>
    <button class="cal-city-pill" data-city="Roma">Roma</button>
    <button class="cal-city-pill" data-city="Stockholm">Stockholm</button>
    <button class="cal-city-pill" data-city="Dublin">Dublin</button>
  </div>

  <main class="cal-main">

    <!-- Venstre: kalender -->
    <section class="cal-section">

      <div class="cal-header">
        <div class="cal-city-label" id="cal-city-label"></div>
        <div class="cal-header-right">
          <button class="cal-add-btn" id="btn-add-glimt" title="Opprett nytt glimt">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            Nytt glimt
          </button>
          <div class="cal-nav">
          <button class="cal-nav-btn" id="btn-prev" aria-label="Forrige måned">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M15 18l-6-6 6-6"/>
            </svg>
          </button>
          <h2 class="cal-month-title" id="cal-month-title"></h2>
          <button class="cal-nav-btn" id="btn-next" aria-label="Neste måned">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 18l6-6-6-6"/>
            </svg>
          </button>
          </div>
        </div>
      </div>

      <!-- Ukedager -->
      <div class="cal-weekdays">
        <span>Man</span><span>Tir</span><span>Ons</span>
        <span>Tor</span><span>Fre</span><span>Lør</span><span>Søn</span>
      </div>

      <!-- Kalendergrid -->
      <div class="cal-grid" id="cal-grid"></div>

    </section>

    <!-- Høyre: arrangementsforslag -->
    <aside class="cal-aside" id="cal-aside">
      <div class="cal-aside-empty" id="cal-aside-empty">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-light)">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <p>Klikk på en dato for å se forslag til hva som skjer i byen</p>
      </div>
      <div id="cal-aside-content" style="display:none">
        <div class="cal-aside-date" id="cal-aside-date"></div>
        <div class="cal-events-list" id="cal-events-list"></div>
      </div>
    </aside>

  </main>

  <!-- Modal: Opprett nytt glimt -->
  <div class="cal-modal-overlay" id="cal-modal" style="display:none">
    <div class="cal-modal">
      <div class="cal-modal-header">
        <h2 class="cal-modal-title">Opprett nytt glimt</h2>
        <button class="cal-modal-close" id="btn-modal-close">&times;</button>
      </div>
      <form id="cal-glimt-form" class="cal-modal-form">

        <div class="cal-form-row">
          <label class="cal-form-label" for="cal-glimt-emoji">Emoji</label>
          <div class="cal-emoji-picker" id="cal-emoji-picker">
            <button type="button" class="cal-emoji-opt selected" data-emoji="🎧">🎧</button>
            <button type="button" class="cal-emoji-opt" data-emoji="🎵">🎵</button>
            <button type="button" class="cal-emoji-opt" data-emoji="⚽">⚽</button>
            <button type="button" class="cal-emoji-opt" data-emoji="🎭">🎭</button>
            <button type="button" class="cal-emoji-opt" data-emoji="🍷">🍷</button>
            <button type="button" class="cal-emoji-opt" data-emoji="✈️">✈️</button>
            <button type="button" class="cal-emoji-opt" data-emoji="🌴">🌴</button>
            <button type="button" class="cal-emoji-opt" data-emoji="📷">📷</button>
            <button type="button" class="cal-emoji-opt" data-emoji="📚">📚</button>
            <button type="button" class="cal-emoji-opt" data-emoji="🎉">🎉</button>
            <button type="button" class="cal-emoji-opt" data-emoji="💜">💜</button>
            <button type="button" class="cal-emoji-opt" data-emoji="⭐">⭐</button>
          </div>
          <input type="hidden" id="cal-glimt-emoji" value="🎧" />
        </div>

        <div class="cal-form-row">
          <label class="cal-form-label" for="cal-glimt-title">Tittel</label>
          <input type="text" id="cal-glimt-title" class="cal-form-input" placeholder="F.eks. Konsert i Operaen" required />
        </div>

        <div class="cal-form-row cal-form-row--half">
          <div>
            <label class="cal-form-label" for="cal-glimt-date">Dato</label>
            <input type="date" id="cal-glimt-date" class="cal-form-input" required />
          </div>
          <div>
            <label class="cal-form-label" for="cal-glimt-city">By</label>
            <select id="cal-glimt-city" class="cal-form-input">
              <option value="København">København</option>
              <option value="Roma">Roma</option>
              <option value="Stockholm">Stockholm</option>
              <option value="Dublin">Dublin</option>
              <option value="Annet">Annet</option>
            </select>
          </div>
        </div>

        <div class="cal-form-row">
          <label class="cal-form-label" for="cal-glimt-category">Kategori</label>
          <select id="cal-glimt-category" class="cal-form-input">
            <option value="Arrangement">Arrangement</option>
            <option value="Konsert">Konsert</option>
            <option value="Festival">Festival</option>
            <option value="Mat">Mat &amp; drikke</option>
            <option value="Kultur">Kultur</option>
            <option value="Sport">Sport</option>
            <option value="Tur">Tur &amp; aktivitet</option>
            <option value="Marked">Marked</option>
            <option value="Sesong">Sesong</option>
            <option value="Annet">Annet</option>
          </select>
        </div>

        <div class="cal-form-row">
          <label class="cal-form-label" for="cal-glimt-desc">Beskrivelse</label>
          <textarea id="cal-glimt-desc" class="cal-form-textarea" rows="3" placeholder="Kort beskrivelse av arrangementet..."></textarea>
        </div>

        <button type="submit" class="cal-form-submit">Lagre glimt</button>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="auth-guard.js"></script>
  <script src="auth.js"></script>
  <script src="cities.js"></script>
  <script src="calendar.js"></script>
<script src="mobile-nav.js"></script>
</body>
</html>
