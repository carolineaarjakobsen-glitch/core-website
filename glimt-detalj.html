<style id="spotify-style">
.spotify-field { background: #fff; border-radius: 14px; padding: 14px 18px; margin-bottom: 1.2rem; box-shadow: 0 3px 14px rgba(93,55,42,0.06); border: 1px solid rgba(93,55,42,0.08); }
.spotify-field-label { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 500; color: #5D372A; margin-bottom: 6px; }
.spotify-field-label svg { color: #1DB954; }
.spotify-field-input { width: 100%; border: 1px solid #e4e4e4; background: #fafafa; border-radius: 8px; padding: 8px 12px; font: inherit; font-size: 0.88rem; color: #1a1a1a; box-sizing: border-box; }
.spotify-field-input:focus { outline: none; border-color: #5D372A; background: #fff; }
.spotify-embed-container { margin-top: 10px; }
.spotify-embed-container iframe { border-radius: 12px; display: block; width: 100%; border: none; }
.spotify-hero { margin: 0 auto 2rem; max-width: 760px; padding: 0 1rem; }
.spotify-hero iframe { border-radius: 12px; display: block; width: 100%; border: none; }
</style>

<script>
window.spotifyToEmbedUrl = function(url) {
  if (!url) return null;
  var m = String(url).match(/open\.spotify\.com\/(?:intl-[^/]+\/)?(track|playlist|album|episode|show|artist)\/([a-zA-Z0-9]+)/);
  if (!m) return null;
  return "https://open.spotify.com/embed/" + m[1] + "/" + m[2];
};
window.renderSpotifyEmbed = function(url, container) {
  if (!container) return;
  var embed = window.spotifyToEmbedUrl(url);
  if (!embed) { container.innerHTML = ""; return; }
  container.innerHTML = '<iframe src="' + embed + '" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
};
</script>
<style id="detalj-edit-style">
.detalj-subtitle { color: rgba(93,55,42,0.75); font-size: 1rem; margin: 0.3rem 0 0.8rem; line-height: 1.5; font-family: 'DM Sans', sans-serif; font-style: italic; max-width: 640px; }
[data-edit-field] { position: relative; border-radius: 6px; transition: background 0.15s, outline 0.15s; }
[data-edit-field][data-owner="1"] { cursor: text; }
[data-edit-field][data-owner="1"]:hover { background: rgba(255,238,188,0.5); }
[data-edit-field][data-owner="1"]:focus { outline: 2px solid #EA672D; outline-offset: 4px; background: rgba(255,238,188,0.65); }
[data-edit-field][data-empty="1"] { color: rgba(93,55,42,0.45); font-style: italic; }
[data-edit-field][data-owner="1"]::after { content: "✎"; display: inline-block; margin-left: 8px; opacity: 0; transition: opacity 0.15s; font-size: 0.8em; color: #EA672D; }
[data-edit-field][data-owner="1"]:hover::after { opacity: 0.7; }
[data-edit-field][data-owner="1"]:focus::after { opacity: 0; }
</style>
