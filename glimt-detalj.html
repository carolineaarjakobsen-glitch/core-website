<style id="spotify-style">
.spotify-field { background: #fff; border-radius: 14px; padding: 14px 18px; margin-bottom: 1.2rem; box-shadow: 0 3px 14px rgba(93,55,42,0.06); border: 1px solid rgba(93,55,42,0.08); }
.spotify-field-label { display: flex; align-items: center; gap: 6px; font-size: 0.82rem; font-weight: 500; color: #5D372A; margin-bottom: 6px; }
.spotify-field-label svg { color: #1DB954; }
.spotify-field-input { width: 100%; border: 1px solid #e4e4e4; background: #fafafa; border-radius: 8px; padding: 8px 12px; font: inherit; font-size: 0.88rem; color: #1a1a1a; box-sizing: border-box; }
.spotify-field-input:focus { outline: none; border-color: #5D372A; background: #fff; }
.spotify-embed-container { margin-top: 10px; }
.spotify-embed-container iframe { border-radius: 12px; display: block; width: 100%; border: none; }
.spotify-hero { margin: 0 auto 2rem; max-width: 760px; padding: 0 1rem; }
.spotify-hero iframe { border-radius: 12px; display: block; width: 100%; border: none; }
</style>

<script>
window.spotifyToEmbedUrl = function(url) {
  if (!url) return null;
  var m = String(url).match(/open\.spotify\.com\/(?:intl-[^/]+\/)?(track|playlist|album|episode|show|artist)\/([a-zA-Z0-9]+)/);
  if (!m) return null;
  return "https://open.spotify.com/embed/" + m[1] + "/" + m[2];
};
window.renderSpotifyEmbed = function(url, container) {
  if (!container) return;
  var embed = window.spotifyToEmbedUrl(url);
  if (!embed) { container.innerHTML = ""; return; }
  container.innerHTML = '<iframe src="' + embed + '" height="152" frameborder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>';
};
</script>
<style id="detalj-edit-style">
.detalj-subtitle { color: rgba(93,55,42,0.75); font-size: 1rem; margin: 0.3rem 0 0.8rem; line-height: 1.5; font-family: 'DM Sans', sans-serif; font-style: italic; max-width: 640px; }
[data-edit-field] { position: relative; border-radius: 6px; transition: background 0.15s, outline 0.15s; }
[data-edit-field][data-owner="1"] { cursor: text; }
[data-edit-field][data-owner="1"]:hover { background: rgba(255,238,188,0.5); }
[data-edit-field][data-owner="1"]:focus { outline: 2px solid #EA672D; outline-offset: 4px; background: rgba(255,238,188,0.65); }
[data-edit-field][data-empty="1"] { color: rgba(93,55,42,0.45); font-style: italic; }
[data-edit-field][data-owner="1"]::after { content: "✎"; display: inline-block; margin-left: 8px; opacity: 0; transition: opacity 0.15s; font-size: 0.8em; color: #EA672D; }
[data-edit-field][data-owner="1"]:hover::after { opacity: 0.7; }
[data-edit-field][data-owner="1"]:focus::after { opacity: 0; }
</style>
<style id="postcard-style">
.detalj-glimts { display: flex; flex-direction: column; gap: 2rem; padding: 1rem 0; }

.postcard { position: relative; display: grid; grid-template-columns: 0.9fr 1.1fr; background: #fefbf4; border: 1px solid rgba(93,55,42,0.15); border-radius: 3px; box-shadow: 0 2px 4px rgba(93,55,42,0.1), 0 10px 24px rgba(93,55,42,0.12); overflow: hidden; min-height: 320px; transition: transform 0.25s, box-shadow 0.25s; }
.postcard:hover { transform: translateY(-3px) rotate(-0.2deg); box-shadow: 0 4px 8px rgba(93,55,42,0.14), 0 14px 32px rgba(93,55,42,0.18); }
.postcard::before { content: ""; position: absolute; inset: 0; pointer-events: none; background-image: radial-gradient(circle at 20% 30%, rgba(180,120,60,0.035) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(180,120,60,0.04) 0%, transparent 45%); z-index: 1; }
.postcard--no-image { grid-template-columns: 1fr; }

/* ── Bildekarusell ── */
.postcard-photos { position: relative; overflow: hidden; background: #f2e6d3; min-height: 100%; }
.postcard-carousel { position: relative; width: 100%; height: 100%; overflow: hidden; }
.postcard-slides { display: flex; width: 100%; height: 100%; transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1); }
.postcard-slide { flex: 0 0 100%; height: 100%; background-size: cover; background-position: center; background-color: #f2e6d3; min-height: 300px; }

.postcard-carousel-dots { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 3; }
.postcard-carousel-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.55); border: none; cursor: pointer; transition: background 0.2s, transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.25); padding: 0; }
.postcard-carousel-dot:hover { background: rgba(255,255,255,0.85); }
.postcard-carousel-dot--active { background: #fff; transform: scale(1.2); }

.postcard-carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.9); color: #3d2818; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3; border: none; opacity: 0; transition: opacity 0.2s, background 0.2s; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
.postcard-carousel-arrow:hover { background: #fff; }
.postcard:hover .postcard-carousel-arrow { opacity: 1; }
.postcard-carousel-arrow--prev { left: 10px; }
.postcard-carousel-arrow--next { right: 10px; }
.postcard-carousel-arrow svg { width: 16px; height: 16px; }

/* ── Innhold ── */
.postcard-content { padding: 1.1rem 1.4rem 1.4rem; position: relative; background-image: repeating-linear-gradient(transparent 0, transparent 30px, rgba(93,55,42,0.06) 30px, rgba(93,55,42,0.06) 31px); z-index: 2; }

.postcard-index { position: absolute; top: 1.2rem; left: 1.4rem; font-family: 'DM Sans', sans-serif; font-size: 0.65rem; letter-spacing: 0.18em; color: rgba(93,55,42,0.5); text-transform: uppercase; font-weight: 500; }

.postcard-stamp { position: absolute; top: 1rem; right: 1rem; width: 56px; height: 66px; background: linear-gradient(135deg, #d6744a 0%, #b8552d 100%); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 1.7rem; padding: 3px; transform: rotate(4deg); box-shadow: 1px 2px 5px rgba(0,0,0,0.15); clip-path: polygon(6% 0%, 16% 4%, 26% 0%, 36% 4%, 46% 0%, 56% 4%, 66% 0%, 76% 4%, 86% 0%, 94% 4%, 100% 10%, 96% 20%, 100% 30%, 96% 40%, 100% 50%, 96% 60%, 100% 70%, 96% 80%, 100% 90%, 94% 96%, 86% 100%, 76% 96%, 66% 100%, 56% 96%, 46% 100%, 36% 96%, 26% 100%, 16% 96%, 6% 100%, 0% 90%, 4% 80%, 0% 70%, 4% 60%, 0% 50%, 4% 40%, 0% 30%, 4% 20%, 0% 10%); }
.postcard-stamp-inner { background: rgba(255,255,255,0.14); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; border: 1.5px dashed rgba(255,255,255,0.45); border-radius: 2px; }

.postcard-postmark { position: absolute; top: 4.8rem; right: 1.8rem; width: 70px; height: 70px; border: 2px solid rgba(180,80,40,0.5); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotate(-14deg); font-family: 'DM Sans', sans-serif; font-size: 0.58rem; font-weight: 600; color: rgba(180,80,40,0.62); text-align: center; line-height: 1.1; letter-spacing: 0.05em; text-transform: uppercase; padding: 0.4rem; opacity: 0.85; }
.postcard-postmark::before { content: ""; position: absolute; inset: 4px; border: 1px solid rgba(180,80,40,0.35); border-radius: 50%; }
.postcard-postmark-city { font-weight: 700; letter-spacing: 0.1em; font-size: 0.62rem; }
.postcard-postmark-dots { font-size: 0.5rem; opacity: 0.7; margin-top: 2px; }

.postcard-title { font-family: 'DM Sans', sans-serif; font-size: 1.15rem; font-weight: 500; color: #2a1a10; margin: 2rem 5.5rem 0.4rem 0; line-height: 1.25; letter-spacing: -0.01em; }
.postcard-address { font-family: 'DM Sans', sans-serif; display: inline-flex; align-items: center; gap: 0.35rem; color: #7a5136; font-size: 0.78rem; margin-bottom: 0.9rem; font-style: italic; max-width: 100%; }
.postcard-address svg { flex-shrink: 0; color: #b8552d; }

.postcard-divider { border-top: 1px dashed rgba(93,55,42,0.28); margin: 0.7rem 0 0.8rem; }

/* TYPEWRITER FONT for meldingen */
.postcard-message { font-family: 'Special Elite', 'Courier Prime', 'Courier New', 'Courier', monospace; font-size: 0.95rem; line-height: 1.55; color: #3d2818; white-space: pre-wrap; word-break: break-word; letter-spacing: 0.01em; }

.postcard-footer { display: flex; justify-content: flex-end; margin-top: 1rem; padding-top: 0.5rem; border-top: 1px dashed rgba(93,55,42,0.2); }

@media (max-width: 780px) {
  .postcard { grid-template-columns: 1fr; min-height: 0; }
  .postcard-photos { aspect-ratio: 4/3; }
  .postcard-slide { min-height: 0; }
  .postcard-content { padding: 1rem 1.2rem 1.2rem; }
  .postcard-title { margin-right: 4.5rem; font-size: 1.05rem; }
  .postcard-stamp { width: 48px; height: 56px; font-size: 1.4rem; }
  .postcard-postmark { width: 56px; height: 56px; top: 4rem; right: 1.2rem; font-size: 0.5rem; }
  .postcard-carousel-arrow { opacity: 1; width: 30px; height: 30px; }
  .postcard-message { font-size: 0.92rem; }
}
</style>
